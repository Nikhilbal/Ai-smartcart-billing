services:
  - type: web
    name: smart-cart-admin-ui
    runtime: static
    buildCommand: npm ci && npm run build:admin
    staticPublishPath: admin-dashboard/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: web
    name: smart-cart-customer-ui
    runtime: static
    buildCommand: npm ci && npm run build:customer
    staticPublishPath: mobile-app/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false

  - type: web
    name: smart-cart-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: STORE_ID
        value: mumbai-vile-parle
      - key: DATABASE_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: smart-cart-ai-service
    runtime: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
