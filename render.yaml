databases:
  - name: smart-cart-postgres
    databaseName: smartcart
    user: smartcart
    plan: free

services:
  - type: web
    name: smart-cart-admin-ui
    runtime: static
    rootDir: admin-dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: web
    name: smart-cart-customer-ui
    runtime: static
    rootDir: mobile-app
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false
      - key: EXPO_PUBLIC_DEMO_OTP
        value: "false"

  - type: web
    name: smart-cart-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npm run prisma:deploy
    initialDeployHook: npm run seed:prod
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: STORE_ID
        value: mumbai-vile-parle
      - key: DATABASE_URL
        fromDatabase:
          name: smart-cart-postgres
          property: connectionString
      - key: AI_SERVICE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OTP_PROVIDER
        value: demo
      - key: OTP_EXPOSE_DEMO_OTP
        value: "false"
      - key: OTP_TTL_SECONDS
        value: "300"
      - key: OTP_HTTP_URL
        sync: false
      - key: OTP_HTTP_METHOD
        value: POST
      - key: OTP_HTTP_AUTH_HEADER
        sync: false
      - key: OTP_HTTP_AUTH_VALUE
        sync: false
      - key: OTP_HTTP_BODY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  - type: web
    name: smart-cart-ai-service
    runtime: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
