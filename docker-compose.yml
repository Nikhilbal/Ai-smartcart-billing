services:
  postgres:
    image: postgres:16-alpine
    container_name: smartcart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartcart
      POSTGRES_PASSWORD: smartcart
      POSTGRES_DB: smartcart
    ports:
      - "5432:5432"
    volumes:
      - smartcart_pg:/var/lib/postgresql/data

volumes:
  smartcart_pg:
